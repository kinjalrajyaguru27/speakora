<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Passages | Speakora</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --beginner: #10b981;
            --intermediate: #f59e0b;
            --advanced: #ef4444;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --premium-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --card-glass: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Header ===== */
        header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 26px;
            font-weight: 800;
            color: #1e3a8a;
            text-decoration: none;
        }

        .logo img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }

        .logo span {
            font-size: 28px;
            background: var(--premium-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-back {
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            color: var(--primary);
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-back:hover {
            background: #f9fafb;
            transform: translateY(-1px);
        }

        /* ===== Hero Section ===== */
        .hero {
            padding: 60px 5% 40px;
            text-align: center;
            background: radial-gradient(circle at top right, #e0e7ff 0%, transparent 40%),
                radial-gradient(circle at bottom left, #fae8ff 0%, transparent 40%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2.5rem;
        }

        /* ===== Level Tabs ===== */
        .level-tabs {
            display: inline-flex;
            background: white;
            padding: 6px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 40px;
            border: 1px solid #e2e8f0;
        }

        .tab-btn {
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text-muted);
            background: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover:not(.active) {
            background: #f1f5f9;
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .tab-btn i {
            font-size: 0.9rem;
        }

        .tab-btn.active.beginner {
            background: #ecfdf5;
            color: var(--beginner);
        }

        .tab-btn.active.intermediate {
            background: #fffbeb;
            color: var(--intermediate);
        }

        .tab-btn.active.advanced {
            background: #fef2f2;
            color: var(--advanced);
        }

        .tab-btn.active {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* ===== Stories Grid ===== */
        .stories-container {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .story-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .story-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.15);
            border-color: var(--primary-light);
            background: white;
        }

        .story-img-wrapper {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
        }

        .story-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .story-card:hover img {
            transform: scale(1.1);
        }

        .level-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: white;
            z-index: 2;
        }

        .badge-beginner {
            background: var(--beginner);
        }

        .badge-intermediate {
            background: var(--intermediate);
        }

        .badge-advanced {
            background: var(--advanced);
        }

        .story-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .story-content h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #1e1b4b;
            line-height: 1.25;
            letter-spacing: -0.01em;
        }

        .story-content p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
        }

        .read-btn {
            color: var(--primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }

        /* ===== Modal ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalSlideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 24px 40px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .close-modal {
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .close-modal:hover {
            background: #e2e8f0;
            color: #ef4444;
        }

        .modal-body {
            padding: 40px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .full-story {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #334155;
            margin-bottom: 50px;
            white-space: pre-line;
            font-family: 'Inter', sans-serif;
        }

        /* ===== Quiz Styling ===== */
        .quiz-section {
            background: #f8fafc;
            border-radius: 24px;
            padding: 40px;
            border: 2px solid #e2e8f0;
        }

        .quiz-section h3 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .question-card {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #0f172a;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 14px 20px;
            border-radius: 12px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .option-btn:hover {
            border-color: var(--primary-light);
            background: #f5f3ff;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eff6ff;
            box-shadow: 0 0 0 2px var(--primary-light);
        }

        .option-btn.correct {
            background: #ecfdf5;
            border-color: var(--beginner);
            color: #065f46;
        }

        .option-btn.wrong {
            background: #fef2f2;
            border-color: var(--advanced);
            color: #991b1b;
        }

        .explanation {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
        }

        /* ===== Results Overlay ===== */
        .quiz-footer {
            margin-top: 40px;
            text-align: center;
        }

        .submit-btn {
            background: var(--premium-gradient);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .results-summary {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: white;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--premium-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .score-circle .score-num {
            font-size: 2rem;
            font-weight: 800;
        }

        .score-circle .score-total {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Loader */
        #loader {
            display: flex;
            justify-content: center;
            padding: 100px 0;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .level-tabs {
                flex-wrap: wrap;
                justify-content: center;
            }

            .modal-content {
                height: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <img src="assets/logo.png" alt="Speakora Logo">
            Speakora
        </div>
    </header>

    <div class="hero">
        <h1>Reading Passages</h1>
        <p>Improve your reading comprehension with stories tailored to your level. Explore history, technology, and
            more.</p>
        <p id="storyCounter"
            style="color: var(--primary); font-weight: 600; margin-top: -1.5rem; margin-bottom: 2rem; font-size: 0.9rem; opacity: 0.8;">
            Loading stories...
        </p>

        <div class="level-tabs">
            <button class="tab-btn active" onclick="filterStories('All', this)">
                <i class="fas fa-layer-group"></i> All Levels
            </button>
            <button class="tab-btn beginner" onclick="filterStories('Beginner', this)">
                <i class="fas fa-seedling"></i> Beginner
            </button>
            <button class="tab-btn intermediate" onclick="filterStories('Intermediate', this)">
                <i class="fas fa-bolt"></i> Intermediate
            </button>
            <button class="tab-btn advanced" onclick="filterStories('Advanced', this)">
                <i class="fas fa-crown"></i> Advanced
            </button>
        </div>
    </div>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary);"></i>
    </div>

    <div class="stories-container" id="storiesContainer">
        <!-- Stories injected here -->
    </div>

    <!-- Story Modal -->
    <div class="modal" id="storyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Story Title</h2>
                <button class="close-modal" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="full-story" id="modalText">
                    <!-- Text injected here -->
                </div>

                <div class="quiz-section">
                    <h3><i class="fas fa-pen-nib" style="color: var(--primary);"></i> Comprehension Quiz</h3>
                    <div id="quizContainer">
                        <!-- Questions injected here -->
                    </div>

                    <div class="results-summary" id="resultsSummary">
                        <div class="score-circle">
                            <span class="score-num" id="scoreNum">0</span>
                            <span class="score-total" id="scoreTotal">/ 5</span>
                        </div>
                        <h4 id="resultTitle">Well Done!</h4>
                        <p id="resultMsg">You've completed the quiz and viewed the solutions.</p>
                    </div>

                    <div class="quiz-footer">
                        <button class="submit-btn" id="submitQuizBtn" onclick="submitQuiz()">Submit Answers & View
                            Solutions</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allStories = [];
        let currentLevel = 'All';
        let currentStory = null;
        let selectedAnswers = {};

        async function fetchStories() {
            try {
                // Try relative first, then absolute for local dev
                const origins = ['', 'http://localhost:5000'];
                let success = false;

                for (const origin of origins) {
                    try {
                        const response = await fetch(`${origin}/api/stories`, {
                            mode: origin ? 'cors' : 'same-origin'
                        });
                        if (response.ok) {
                            allStories = await response.json();

                            // Sort stories by level: Beginner -> Intermediate -> Advanced
                            const levelOrder = { 'Beginner': 1, 'Intermediate': 2, 'Advanced': 3 };
                            allStories.sort((a, b) => (levelOrder[a.category] || 99) - (levelOrder[b.category] || 99));

                            success = true;
                            console.log(`Stories loaded from ${origin || 'same origin'}`);
                            break;
                        }
                    } catch (e) {
                        continue;
                    }
                }

                if (!success) throw new Error('Could not reach backend');
            } catch (err) {
                console.warn('Backend not accessible, checking global READING_DATABASE fallback');
                // Use fallback from local script if needed (for static testing)
                if (window.READING_DATABASE) {
                    allStories = window.READING_DATABASE;
                } else {
                    // Inject basic fallback if nothing found
                    allStories = [];
                }
            } finally {
                document.getElementById('loader').style.display = 'none';
                renderStories();
            }
        }

        function renderStories() {
            const container = document.getElementById('storiesContainer');
            container.style.opacity = '0';

            setTimeout(() => {
                container.innerHTML = '';
                const filtered = currentLevel === 'All' ? allStories : allStories.filter(s => s.category === currentLevel);
                document.getElementById('storyCounter').innerText = `Showing ${filtered.length} stories`;

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                            <i class="fas fa-book-open fa-3x" style="color: #e2e8f0; margin-bottom: 20px;"></i>
                            <p style="color: var(--text-muted); font-size: 1.1rem;">No stories found for this level yet.</p>
                        </div>
                    `;
                }

                filtered.forEach(story => {
                    const card = document.createElement('div');
                    card.className = 'story-card';
                    card.onclick = () => openStory(story);

                    // Image fallback - if original fails, use a generic Unsplash placeholder
                    const imageUrl = story.image || 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=800';

                    card.innerHTML = `
                        <div class="story-img-wrapper">
                            <span class="level-badge badge-${story.category.toLowerCase()}">${story.category}</span>
                            <img src="${imageUrl}" alt="${story.title}" onerror="this.src='https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=800'; this.onerror=null;">
                        </div>
                        <div class="story-content">
                            <h3>${story.title}</h3>
                            <p>${story.excerpt}</p>
                            <div class="card-footer">
                                <span class="read-btn">Read & Quiz <i class="fas fa-arrow-right"></i></span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
                container.style.opacity = '1';
            }, 300);
        }

        function filterStories(level, btn) {
            currentLevel = level;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderStories();
        }

        function openStory(story) {
            currentStory = story;
            selectedAnswers = {};

            document.getElementById('modalTitle').innerText = story.title;
            document.getElementById('modalText').innerText = story.content;

            const quizContainer = document.getElementById('quizContainer');
            quizContainer.innerHTML = '';

            story.questions.forEach((q, qIndex) => {
                const qCard = document.createElement('div');
                qCard.className = 'question-card';

                let optionsHtml = q.options.map((opt, oIndex) => `
                    <button class="option-btn" onclick="selectOption(${qIndex}, ${oIndex}, this)">
                        ${opt}
                    </button>
                `).join('');

                qCard.innerHTML = `
                    <div class="question-text">Q${qIndex + 1}: ${q.question}</div>
                    <div class="options-grid">${optionsHtml}</div>
                    <div class="explanation" id="exp-${qIndex}">
                        <strong>Solution:</strong> ${q.explanation || 'The correct answer is ' + q.options[q.correctAnswer]}
                    </div>
                `;
                quizContainer.appendChild(qCard);
            });

            // Reset UI
            document.getElementById('resultsSummary').style.display = 'none';
            document.getElementById('submitQuizBtn').style.display = 'inline-block';
            document.getElementById('submitQuizBtn').disabled = false;

            document.getElementById('storyModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function selectOption(qIdx, oIdx, btn) {
            // Unselect others in same question
            const parent = btn.parentElement;
            parent.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));

            btn.classList.add('selected');
            selectedAnswers[qIdx] = oIdx;
        }

        function submitQuiz() {
            const questions = currentStory.questions;
            let score = 0;

            questions.forEach((q, qIdx) => {
                const exp = document.getElementById(`exp-${qIdx}`);
                exp.style.display = 'block';

                const buttons = exp.previousElementSibling.querySelectorAll('.option-btn');
                const userAns = selectedAnswers[qIdx];
                const correctAns = q.correctAnswer;

                buttons.forEach((btn, bIdx) => {
                    btn.disabled = true; // Disable after submit
                    if (bIdx === correctAns) {
                        btn.classList.add('correct');
                    } else if (bIdx === userAns) {
                        btn.classList.add('wrong');
                    }
                });

                if (userAns === correctAns) {
                    score++;
                    exp.style.borderColor = 'var(--beginner)';
                } else {
                    exp.style.borderColor = 'var(--advanced)';
                }
            });

            // Show results
            document.getElementById('scoreNum').innerText = score;
            document.getElementById('scoreTotal').innerText = `/ ${questions.length}`;
            document.getElementById('resultsSummary').style.display = 'block';
            document.getElementById('submitQuizBtn').style.display = 'none';

            // Scroll to results
            document.getElementById('resultsSummary').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function closeModal() {
            document.getElementById('storyModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Initialize
        window.addEventListener('load', fetchStories);

        // Global error handling for fetch
        window.addEventListener('error', (e) => {
            if (e.message.includes('fetch')) {
                console.log('Handled fetch error');
            }
        }, true);
    </script>

    <!-- Fallback data script for local environments without API -->
    <script src="js/reading-data.js"></script>

</body>

</html>
