<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Lesson | Speakora</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --accent: #818cf8;
            --bg-gradient: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            --card-bg: #ffffff;
            --glass-border: 1px solid rgba(255, 255, 255, 0.5);
            --text-main: #1f2937;
            --text-light: #6b7280;
            --success: #10b981;
            --highlight: #fef3c7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 26px;
            font-weight: 800;
            color: #1e3a8a;
            text-decoration: none;
        }

        .logo img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }

        .lesson-progress-bar {
            width: 200px;
            height: 10px;
            background: #e5e7eb;
            border-radius: 5px;
            overflow: hidden;
        }

        .lesson-progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: 0.5s ease;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* CONTENT CARD */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lesson-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f3f4f6;
        }

        .level-badge {
            background: #e0e7ff;
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 16px;
            color: var(--text-main);
            font-weight: 800;
            line-height: 1.2;
        }

        .description {
            color: var(--text-light);
            font-size: 20px;
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Controls */
        .controls-sticky {
            position: sticky;
            top: 80px;
            background: white;
            z-index: 90;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            border: 1px solid #e5e7eb;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: var(--text-light);
        }

        .speed-btn {
            background: #f3f4f6;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
            transition: 0.2s;
        }

        .speed-btn.active {
            background: var(--primary);
            color: white;
        }

        /* CONTENT ITEMS */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .item {
            padding: 30px;
            border-radius: 16px;
            border: 2px solid #f3f4f6;
            transition: 0.3s;
            position: relative;
            background: white;
        }

        .item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .item.highlight {
            border-color: var(--primary);
            background: #f5f3ff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .item-content {
            font-size: 22px;
            line-height: 1.8;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .word-highlight {
            background-color: var(--highlight);
            border-radius: 4px;
            padding: 0 2px;
        }

        .voice-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .listen-btn {
            background: white;
            border: 2px solid #e5e7eb;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .listen-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f5f3ff;
        }

        .listen-btn.playing {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            animation: pulse 2s infinite;
        }

        .listen-btn.stop {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(79, 70, 229, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(79, 70, 229, 0);
            }
        }

        /* BOTTOM NAV */
        .footer-nav {
            margin-top: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid #f3f4f6;
        }

        .complete-btn {
            background: var(--primary);
            color: white;
            padding: 18px 40px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .complete-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .card {
                padding: 20px;
            }

            h1 {
                font-size: 32px;
            }

            .item-content {
                font-size: 18px;
            }

            .complete-btn {
                width: 100%;
                justify-content: center;
            }

            .footer-nav {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="lesson.html" class="logo">
            <img src="assets/logo.png" alt="Speakora Logo">
            Speakora
        </a>
        <div
            style="display: flex; align-items: center; gap: 10px; color: var(--text-light); font-size: 14px; font-weight: 600;">
            <span>Your Progress</span>
            <div class="lesson-progress-bar">
                <div class="lesson-progress-fill" id="progressBar"></div>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="card" id="lesson-content">
            <div style="text-align: center; padding: 60px; color: var(--text-light);">
                <div style="font-size: 40px; margin-bottom: 20px;">⏳</div>
                <div style="font-size: 20px;">Loading lesson content...</div>
                <div style="margin-top: 10px; font-size: 16px; opacity: 0.7;">Get ready to learn!</div>
            </div>
        </div>

        <div class="footer-nav">
            <div style="font-size: 16px; color: var(--text-light); font-weight: 500;" id="lessonCounter"></div>
            <button class="complete-btn" id="actionBtn" onclick="completeLesson()">
                <span>Complete Lesson</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 12h14m-7-7 7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        let currentLesson = null;
        let allLessons = [];
        let currentIndex = -1;
        let isExerciseMode = false;
        let currentExerciseIndex = 0;
        let score = 0;
        let speechRate = 1.0;

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById("lesson-content");

            if (!id) {
                window.location.href = "lesson.html";
                return;
            }

            try {
                const res = await fetch(`http://localhost:5000/api/lessons/${id}`);
                if (!res.ok) throw new Error("Lesson not found");
                currentLesson = await res.json();

                const listRes = await fetch(`http://localhost:5000/api/lessons/lang/${currentLesson.language}`);
                allLessons = await listRes.json();
                currentIndex = allLessons.findIndex(l => l._id === currentLesson._id);

                renderLesson(currentLesson, false);
                updateProgress();

            } catch (err) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 40px;">
                        <div style="font-size: 40px; margin-bottom: 20px;">⚠️</div>
                        <h2 style="color: #ef4444; margin-bottom: 10px;">Oops! Error loading content.</h2>
                        <p style="color: var(--text-light);">Please check your connection or try again later.</p>
                        <a href="lesson.html" style="display:inline-flex; margin-top: 20px; padding: 10px 20px; background: var(--primary); color: white; border-radius: 8px; text-decoration: none; font-weight: 600;">Go Back</a>
                    </div>
                `;
                console.error(err);
            }
        });

        function renderLesson(lesson, showExercises) {
            const container = document.getElementById("lesson-content");
            const actionBtn = document.getElementById("actionBtn");
            const footerNav = document.querySelector('.footer-nav');

            if (showExercises) {
                renderExercises(lesson);
                return;
            }

            let html = `
                <div class="lesson-header">
                    <span class="level-badge">${lesson.level} • Study Mode 📖</span>
                    <h1>${lesson.title}</h1>
                    <p class="description">${lesson.description}</p>
                </div>
                <div class="controls-sticky">
                    <div class="speed-control">
                        <span>Speed:</span>
                        <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                        <button class="speed-btn active" onclick="setSpeed(1.0)">1.0x</button>
                        <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                    </div>
                </div>
                <div class="content-section">
            `;

            html += lesson.content.map((item, index) => {
                let formattedText = item.value.replace(/\n/g, '<br>');
                return `
                <div class="item" id="item-${index}">
                    <div class="item-content">${formattedText}</div>
                    <div class="voice-controls">
                        <button class="listen-btn" id="btn-${index}" onclick="toggleSpeak(${index}, '${item.value.replace(/'/g, "\\'").replace(/\n/g, " ")}')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polygon points="10 8 16 12 10 16 10 8"></polygon>
                            </svg> Listen
                        </button>
                    </div>
                </div>
            `}).join("");

            html += `</div>`;
            container.innerHTML = html;
            setSpeed(speechRate, false);

            actionBtn.innerHTML = `<span>Start Exercises</span> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7" /></svg>`;
            actionBtn.style.background = "#4f46e5";
            actionBtn.onclick = () => {
                currentExerciseIndex = 0;
                score = 0;
                renderLesson(currentLesson, true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            document.getElementById("lessonCounter").innerText = `Lesson ${currentIndex + 1} of ${allLessons.length}`;
            footerNav.style.display = "flex";
        }

        function renderExercises(lesson) {
            const container = document.getElementById("lesson-content");
            const actionBtn = document.getElementById("actionBtn");
            const exercises = lesson.exercises || [];

            if (currentExerciseIndex >= exercises.length) {
                showQuizResult(lesson);
                return;
            }

            const ex = exercises[currentExerciseIndex];
            let html = `
                <div class="lesson-header">
                    <span class="level-badge">${lesson.level} • Exercises ✍️</span>
                    <h1>Question ${currentExerciseIndex + 1} of ${exercises.length}</h1>
                    <p class="description" style="margin-top: 10px; font-weight: 600; color: var(--text-main);">${ex.question}</p>
                </div>
                <div class="content-section" style="gap: 15px;">
            `;

            ex.options.forEach((opt, idx) => {
                html += `
                    <button class="item" style="text-align: left; width: 100%; cursor: pointer; transition: 0.2s; background: white;" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', this)">
                        <div class="item-content" style="margin-bottom: 0; font-size: 18px;">${opt}</div>
                    </button>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;

            actionBtn.style.display = "none"; // Hide until an answer is picked
        }

        function checkAnswer(selected, element) {
            const exercises = currentLesson.exercises;
            const correct = exercises[currentExerciseIndex].answer;
            const items = document.querySelectorAll('.content-section .item');

            // Disable all buttons
            items.forEach(item => {
                item.onclick = null;
                item.style.cursor = "default";
            });

            if (selected === correct) {
                element.style.borderColor = "#10b981";
                element.style.background = "#ecfdf5";
                score++;
            } else {
                element.style.borderColor = "#ef4444";
                element.style.background = "#fef2f2";
                // Highlight correct one
                items.forEach(item => {
                    if (item.innerText.trim() === correct) {
                        item.style.borderColor = "#10b981";
                        item.style.background = "#ecfdf5";
                    }
                });
            }

            // Show "Next" button
            const actionBtn = document.getElementById("actionBtn");
            actionBtn.style.display = "flex";
            actionBtn.innerHTML = `<span>${currentExerciseIndex === exercises.length - 1 ? "See Results" : "Next Question"}</span> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7" /></svg>`;
            actionBtn.onclick = () => {
                currentExerciseIndex++;
                renderLesson(currentLesson, true);
            };
        }

        function showQuizResult(lesson) {
            const container = document.getElementById("lesson-content");
            const actionBtn = document.getElementById("actionBtn");
            const total = lesson.exercises.length;
            const percent = Math.round((score / total) * 100);

            // AUTO-SAVE SCORE ON COMPLETION
            const userId = localStorage.getItem("userId") || localStorage.getItem("currentUser") || "anonymous";
            const learningData = JSON.parse(localStorage.getItem(userId + "_learningData") || '{"quizzes":[]}');
            if (!learningData.quizzes) learningData.quizzes = [];
            const lessonNum = currentIndex + 1;
            learningData.quizzes.push({
                lessonId: lesson._id,
                lessonTitle: lesson.title,
                lessonNum: lessonNum,
                score: percent,
                date: new Date().toISOString()
            });
            localStorage.setItem(userId + "_learningData", JSON.stringify(learningData));

            if (window.SpeakoraActivity) {
                const lessonNum = currentIndex + 1;
                SpeakoraActivity.log('lesson', `Completed Exercises for <b>Lesson ${lessonNum}: ${lesson.title}</b>`, percent, '#4f46e5');
            }

            let message = "Excellent! You've mastered this lesson.";
            let icon = "🏆";
            if (percent < 100) { message = "Great job! Almost perfect."; icon = "🌟"; }
            if (percent < 70) { message = "Good effort! Try to review the content again."; icon = "📚"; }

            container.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 60px; margin-bottom: 20px;">${icon}</div>
                    <h1>Lesson Result</h1>
                    <div style="font-size: 48px; font-weight: 800; color: var(--primary); margin: 20px 0;">${score} / ${total}</div>
                    <p class="description">${message}</p>
                    <div style="margin-top: 30px;">
                        <button class="speed-btn" onclick="renderLesson(currentLesson, false)" style="padding: 10px 20px;">Review Lesson</button>
                    </div>
                </div>
            `;

            const isLast = currentIndex === allLessons.length - 1;
            actionBtn.style.display = "flex";
            actionBtn.style.background = "#10b981";
            actionBtn.innerHTML = `<span>${isLast ? "Finish Course" : "Complete & Next Lesson"}</span> <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-7-7 7 7-7 7" /></svg>`;
            actionBtn.onclick = completeLesson;
        }

        function updateProgress() {
            const progress = ((currentIndex) / allLessons.length) * 100;
            document.getElementById("progressBar").style.width = `${progress}%`;
        }

        function setSpeed(rate, updateUI = true) {
            speechRate = rate;
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                resetButtons();
            }
            if (updateUI) {
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.innerText.includes(rate)) btn.classList.add('active');
                });
            }
        }

        function resetButtons() {
            document.querySelectorAll('.listen-btn').forEach(b => {
                b.classList.remove('playing', 'stop');
                b.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg> Listen`;
                b.closest('.item').classList.remove('highlight');
            });
        }

        function toggleSpeak(index, text) {
            const btn = document.getElementById(`btn-${index}`);
            const item = document.getElementById(`item-${index}`);
            if (btn.classList.contains('playing')) {
                window.speechSynthesis.cancel();
                resetButtons();
                return;
            }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                resetButtons();
                const cleanText = text.replace(/<[^>]*>/g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'en-US';
                utterance.rate = speechRate;
                utterance.onstart = () => {
                    btn.classList.add('playing');
                    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> Stop`;
                    item.classList.add('highlight');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                };
                utterance.onend = resetButtons;
                utterance.onerror = resetButtons;
                window.speechSynthesis.speak(utterance);
            }
        }

        function completeLesson() {
            // 1. Save progress to both keys for compatibility
            const completedIds = JSON.parse(localStorage.getItem((localStorage.getItem("userId") || localStorage.getItem("currentUser") || "anonymous") + "_" + "completedLessons") || "[]");
            if (!completedIds.includes(currentLesson._id)) {
                completedIds.push(currentLesson._id);
                localStorage.setItem((localStorage.getItem("userId") || localStorage.getItem("currentUser") || "anonymous") + "_" + "completedLessons", JSON.stringify(completedIds));
            }

            // Sync with learningData for progress.html
            const learningData = JSON.parse(localStorage.getItem((localStorage.getItem("userId") || localStorage.getItem("currentUser") || "anonymous") + "_" + "learningData") || "{}");
            learningData.completedLessons = completedIds.length;
            learningData.totalLessons = allLessons.length;

            localStorage.setItem((localStorage.getItem("userId") || localStorage.getItem("currentUser") || "anonymous") + "_" + "learningData", JSON.stringify(learningData));

            if (window.SpeakoraActivity) {
                const lessonNum = currentIndex + 1;
                SpeakoraActivity.log('lesson', `Lesson ${lessonNum}: <b>${currentLesson.title}</b> fully complete`, null, '#10b981');
            }

            // 2. Navigate
            document.getElementById("progressBar").style.width = `${((currentIndex + 1) / allLessons.length) * 100}%`;

            setTimeout(() => {
                if (currentIndex < allLessons.length - 1) {
                    const nextLesson = allLessons[currentIndex + 1];
                    window.location.href = `lesson-view.html?id=${nextLesson._id}`;
                } else {
                    alert("🎉 Congratulations! You have completed the course!");
                    window.location.href = "lesson.html";
                }
            }, 800);
        }
    </script>

    <script src="js/activity-logger.js"></script>
    <script src="js/global-nav.js"></script>
</body>

</html>
