<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Coming Soon | Speakora</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #fcfdfe;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .icon-box {
            width: 120px;
            height: 120px;
            background: #eef2ff;
            color: var(--primary);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 30px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-back {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 14px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 26px;
            font-weight: 800;
            color: #1e3a8a;
            text-decoration: none;
        }

        .logo img {
            width: 44px;
            height: 44px;
        }
    </style>
</head>

<body>
    <header>
        <a href="dashboard.html" class="logo">
            <img src="assets/logo.png" alt="Speakora Logo">
            Speakora
        </a>
    </header>

    <div class="container">
        <div class="icon-box">🚧</div>
        <h1>Work in Progress</h1>
        <p id="msg">Current data for this language is under development. We are working hard to bring you the best
            learning experience soon!</p>
        <a href="dashboard.html" class="btn-back">Back to Dashboard</a>
    </div>

    <script>
        const lang = localStorage.getItem("language") || "this language";
        document.getElementById("msg").innerHTML = `Content for <b>${lang}</b> is currently being prepared. <br>Please check back soon for updates!`;
    </script>
</body>

</html>
